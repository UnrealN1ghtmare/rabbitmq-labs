apiVersion: apps/v1
kind: Deployment

metadata:
  name: service2

spec:
  replicas: 2

  selector:
    matchLabels:
      app: service2

  template:
    metadata:
      labels:
        app: service2

    spec:
      containers:
      - name: service2

        image: service2:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 3001

        envFrom:
        - configMapRef:
            name: rabbitmq-config