apiVersion: apps/v1
kind: Deployment

metadata:
  name: service1

spec:
  replicas: 1

  selector:
    matchLabels:
      app: service1

  template:
    metadata:
      labels:
        app: service1

    spec:
      containers:
      - name: service1

        image: service1:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: rabbitmq-config